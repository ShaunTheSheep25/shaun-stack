services:
  fari-checkins:
    build: ../fari-checkins
    ports:
      - "8001:8000"
    volumes:
      - fari-data:/app/data
    networks:
      - shaun-net

  senpai-lessons:
    build: ../senpai-lessons
    ports:
      - "8002:8000"
    volumes:
      - senpai-data:/app/data
    networks:
      - shaun-net

  sentinel-events:
    build: ../sentinel-events
    ports:
      - "8003:8000"
    networks:
      - shaun-net

  ros-publisher:
    build:
      context: ../aido-telemetry
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
    command: >
      /bin/bash -c "
      source /opt/ros/humble/setup.bash &&
      source /ros_ws/install/setup.bash &&
      python3 /ros_ws/src/aido_telemetry/aido_telemetry/publisher.py"

  aido-bridge:
    build:
      context: ../aido-bridge
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0

  fleet-console:
    build:
      context: ../fleet-console
      args:
        - VITE_SENTINEL_URL=http://localhost:8003
        - VITE_AIDO_BRIDGE_WS=ws://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - sentinel-events
    networks:
      - shaun-net

volumes:
  fari-data:
  senpai-data:

networks:
  shaun-net:
    driver: bridge